<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Ming Pan · 紫微斗数</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  /* Light (Profiles) */
  --ivory:#F3EADB;
  --ivory-2:#F8F1E5;
  --ivory-3:#FBF6EC;
  --ivory-line:#E5D9C2;
  --ink:#2B2A47;
  --ink-2:#403E5C;
  --ink-soft:#7C778A;
  --gold:#A9883F;
  --gold-2:#B9974A;
  --gold-bright:#C9A24C;
  /* Dark (Chart) */
  --aubergine:#221A3A;
  --aubergine-2:#2C2250;
  --aubergine-3:#372A5E;
  --aubergine-line:rgba(201,162,76,.35);
  --gold-soft:#D8B968;
  --ivory-cell:#F2EAD9;
  --ivory-cell-2:#EFE6D2;
  /* Star colors */
  --st-maroon:#9C3A35;
  --st-purple:#6B4F93;
  --st-blue:#3E5C8A;
  --st-green:#4E7A50;
  --st-ink:#393454;
  --st-minor:#7A7748;
  --st-hua:#B06A24;
  --shadow:0 1px 2px rgba(43,42,71,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'EB Garamond',Georgia,serif;
  color:var(--ink);
  background:#1b1530;
  background-image:radial-gradient(120% 90% at 50% 0%, #2a2147 0%, #1b1530 60%, #141022 100%);
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

/* ---- Phone frame ---- */
.phone{
  position:relative;width:100%;max-width:438px;height:100dvh;margin:0 auto;
  background:var(--ivory);overflow:hidden;display:flex;flex-direction:column;
  isolation:isolate;
}
@media(min-width:480px){
  .phone{height:min(940px,96dvh);border-radius:46px;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.65), 0 0 0 11px #0d0a18, 0 0 0 13px #2a2444;}
}

/* ---- Status bar ---- */
.statusbar{position:relative;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:14px 30px 4px;font-family:'EB Garamond',serif;font-weight:600;font-size:16px;flex:0 0 auto;}
.statusbar .sb-time{letter-spacing:.5px;font-variant-numeric:tabular-nums;}
.statusbar .sb-icons{display:flex;align-items:center;gap:7px;}
.sb-dark{color:#1d1b2e;}
.sb-light{color:#F1E7CF;}
.sb-bars{display:flex;align-items:flex-end;gap:2px;height:12px;}
.sb-bars i{width:3px;border-radius:1px;background:currentColor;display:block;}
.sb-bars i:nth-child(1){height:5px;}.sb-bars i:nth-child(2){height:7px;}
.sb-bars i:nth-child(3){height:9px;}.sb-bars i:nth-child(4){height:12px;}
.sb-batt{width:25px;height:12px;border:1.4px solid currentColor;border-radius:3px;position:relative;opacity:.95;}
.sb-batt::after{content:"";position:absolute;right:-3px;top:3.5px;width:2px;height:5px;background:currentColor;border-radius:0 1px 1px 0;}
.sb-batt i{position:absolute;inset:1.5px;width:70%;background:currentColor;border-radius:1px;}

/* ---- Generic screen ---- */
.screen{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;}
@media (prefers-reduced-motion: no-preference){
  .screen-slide{animation:slideIn .4s cubic-bezier(.22,.7,.25,1);}
}
/* transform-only: if the iframe pauses animations at frame 0, content stays visible (just shifted), never blank */
@keyframes slideIn{from{transform:translateX(6%);}to{transform:translateX(0);}}
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* =====================================================
   PROFILES SCREEN (light)
===================================================== */
.p-screen{background:var(--ivory);}
.p-hero{position:relative;padding:6px 0 4px;overflow:hidden;}
.p-topbar{display:flex;justify-content:flex-end;padding:0 26px;position:relative;z-index:4;}
.icon-btn{width:42px;height:42px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--gold);cursor:pointer;border-radius:50%;}
.icon-btn:active{background:rgba(169,136,63,.1);}
.p-emblem{display:flex;flex-direction:column;align-items:center;position:relative;z-index:4;margin-top:-6px;}
.emblem-ring{width:74px;height:74px;border-radius:50%;border:1.4px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative;}
.p-title{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--ink);font-size:43px;letter-spacing:.06em;margin:16px 0 0;line-height:1;white-space:nowrap;}
.p-title small{font-size:.62em;}
.p-sub{font-family:'EB Garamond',serif;color:var(--gold);letter-spacing:.42em;font-size:12.5px;font-weight:500;margin-top:9px;text-transform:uppercase;padding-left:.42em;}
.mist{position:absolute;left:0;right:0;bottom:-1px;height:205px;z-index:1;pointer-events:none;}

.p-section{display:flex;align-items:center;justify-content:center;gap:16px;margin:30px 0 4px;color:var(--ink);}
.p-section .lbl{font-family:'Cormorant Garamond',serif;letter-spacing:.34em;font-size:18px;font-weight:600;text-transform:uppercase;padding-left:.34em;}
.p-section .dash{display:flex;align-items:center;gap:7px;color:var(--gold);}
.p-section .dash::before{content:"";width:34px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.p-section .dash.r::before{background:linear-gradient(90deg,var(--gold),transparent);}
.p-section .dot{font-size:9px;}
.p-dia{display:flex;justify-content:center;color:var(--gold);font-size:9px;margin-bottom:6px;opacity:.8;}

/* profile list */
.p-list{padding:6px 26px 2px;}
.p-row{display:flex;align-items:center;gap:8px;padding:18px 2px;border-top:1px solid var(--ivory-line);cursor:pointer;position:relative;}
.p-row:first-child{border-top:1px solid var(--ivory-line);}
.p-row:active{background:rgba(169,136,63,.045);}
.p-row .pr-main{flex:1;min-width:0;}
.p-row .pr-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:25px;color:var(--ink);line-height:1.1;}
.p-row .pr-meta{font-family:'EB Garamond',serif;font-size:13.5px;color:var(--ink-soft);margin-top:5px;letter-spacing:.01em;}
.p-row .pr-meta b{color:var(--gold);font-weight:400;margin:0 5px;}
.chev{color:var(--gold-2);display:flex;align-items:center;opacity:.85;}
.dots-btn{width:30px;height:38px;border:none;background:transparent;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;}
.dots-btn:active{background:rgba(43,42,71,.06);}

.add-row{display:flex;align-items:center;justify-content:center;gap:13px;width:100%;border:none;background:transparent;
  border-top:1px solid var(--ivory-line);padding:24px;cursor:pointer;color:var(--ink);
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;letter-spacing:.18em;text-transform:uppercase;padding-left:calc(.18em + 24px);}
.add-row:active{background:rgba(169,136,63,.05);}
.add-row .plus{width:23px;height:23px;color:var(--gold);}

/* bottom nav */
.bottomnav{flex:0 0 auto;display:flex;align-items:flex-start;justify-content:center;gap:78px;padding:12px 0 6px;
  border-top:1px solid var(--ivory-line);background:var(--ivory-2);position:relative;z-index:20;}
.navitem{display:flex;flex-direction:column;align-items:center;gap:7px;border:none;background:transparent;cursor:pointer;padding:4px 6px;}
.navitem .ni-ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.navitem .ni-lbl{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);padding-left:.2em;}
.navitem.active .ni-ic{background:var(--aubergine-2);color:var(--gold-soft);box-shadow:0 6px 16px -6px rgba(34,26,58,.5);}
.navitem.active .ni-lbl{color:var(--ink);}
.navitem .ni-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);margin-top:-3px;opacity:0;}
.navitem.active .ni-dot{opacity:1;}
.home-ind{flex:0 0 auto;display:flex;justify-content:center;padding:7px 0 9px;background:var(--ivory-2);}
.home-ind i{width:128px;height:5px;border-radius:3px;background:rgba(43,42,71,.32);display:block;}
.home-ind.dark i{background:rgba(232,214,168,.4);}

/* =====================================================
   CHART SCREEN (dark)
===================================================== */
.c-screen{background:var(--aubergine);color:#EFE3C6;}
.c-stars{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.star-layer{position:absolute;inset:-6% 0;}
.star{position:absolute;border-radius:50%;opacity:var(--o1,.8);will-change:opacity,transform;
  animation:twinkle var(--dur,4s) ease-in-out var(--delay,0s) infinite;}
.star-layer.l1{animation:drift 64s ease-in-out infinite alternate;}
.star-layer.l2{animation:driftB 48s ease-in-out infinite alternate;}
.nebula{position:absolute;border-radius:50%;filter:blur(8px);transform:translate(-50%,-50%);opacity:.85;will-change:transform;
  animation:nebulaDrift var(--ndur,38s) ease-in-out var(--ndelay,0s) infinite alternate;}
.shooting{position:absolute;width:90px;height:1.6px;border-radius:2px;opacity:0;
  background:linear-gradient(90deg,transparent,rgba(240,226,184,0),rgba(240,226,184,.95));
  filter:drop-shadow(0 0 3px rgba(240,226,184,.6));
  animation:shoot var(--sdur,12s) ease-in var(--sdelay,3s) infinite;}
/* This ambient backdrop is intentionally subtle and plays regardless of the
   reduced-motion setting, since it was explicitly requested. */
@keyframes twinkle{0%,100%{opacity:var(--o0,.2);transform:scale(.8);}50%{opacity:var(--o1,.85);transform:scale(1.18);}}
@keyframes drift{from{transform:translate3d(0,0,0);}to{transform:translate3d(8px,16px,0);}}
@keyframes driftB{from{transform:translate3d(0,0,0);}to{transform:translate3d(-10px,-12px,0);}}
@keyframes nebulaDrift{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(calc(-50% + 18px),calc(-50% - 14px)) scale(1.14);}}
@keyframes shoot{
  0%{opacity:0;transform:translate(0,0) rotate(22deg) scaleX(.2);}
  3%{opacity:0;}
  6%{opacity:1;}
  15%{opacity:1;}
  22%{opacity:0;transform:translate(220px,90px) rotate(22deg) scaleX(1);}
  100%{opacity:0;transform:translate(220px,90px) rotate(22deg) scaleX(1);}
}
.c-head{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:2px 18px 2px;}
.c-head .ttl{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.34em;font-size:19px;color:var(--gold-soft);padding-left:.34em;white-space:nowrap;}
.ic-light{width:42px;height:42px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--gold-soft);cursor:pointer;border-radius:50%;}
.ic-light:active{background:rgba(216,185,104,.12);}

.c-emblem{display:flex;flex-direction:column;align-items:center;position:relative;z-index:5;padding:8px 0 2px;}
.c-seal{width:122px;height:122px;border-radius:50%;border:1.5px solid var(--aubergine-line);display:flex;align-items:center;justify-content:center;position:relative;
  animation:sealFloat 7s ease-in-out infinite;}
.c-seal::before{content:"";position:absolute;inset:7px;border-radius:50%;border:1px solid rgba(216,185,104,.18);z-index:2;}
/* rotating ring of degree ticks */
.seal-ticks{position:absolute;inset:-11px;border-radius:50%;border:1.5px dashed rgba(216,185,104,.42);
  animation:sealSpin 60s linear infinite;z-index:1;}
.seal-ticks::after{content:"";position:absolute;inset:5px;border-radius:50%;border:1px dotted rgba(216,185,104,.28);
  animation:sealSpin 90s linear infinite reverse;}
/* light sweep arcing around the rim */
.seal-sweep{position:absolute;inset:-2px;border-radius:50%;z-index:1;
  background:conic-gradient(from 0deg, rgba(240,222,150,0) 0deg, rgba(240,222,150,0) 250deg, rgba(245,228,160,.85) 320deg, rgba(240,222,150,0) 360deg);
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
          mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
  animation:sealSpin 9s linear infinite;}
/* breathing glow behind the characters */
.seal-glow{position:absolute;inset:14px;border-radius:50%;z-index:1;
  background:radial-gradient(circle, rgba(216,185,104,.34), rgba(216,185,104,0) 70%);
  animation:sealPulse 5.5s ease-in-out infinite;}
.c-seal .seal-zh{font-family:'Noto Serif TC',serif;font-weight:500;color:var(--gold-soft);font-size:25px;line-height:1.06;text-align:center;letter-spacing:.04em;
  position:relative;z-index:3;text-shadow:0 0 18px rgba(216,185,104,.3);animation:sealText 5.5s ease-in-out infinite;}
@keyframes sealSpin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
@keyframes sealFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.012);}}
@keyframes sealPulse{0%,100%{opacity:.55;transform:scale(.94);}50%{opacity:1;transform:scale(1.04);}}
@keyframes sealText{0%,100%{text-shadow:0 0 14px rgba(216,185,104,.28);}50%{text-shadow:0 0 24px rgba(216,185,104,.55), 0 0 4px rgba(245,228,160,.4);}}

.c-selector{margin:16px auto 0;position:relative;z-index:6;width:max-content;}
.sel-btn{display:flex;align-items:center;gap:16px;background:rgba(11,8,24,.34);border:1px solid var(--aubergine-line);border-radius:30px;
  padding:11px 22px;color:#F3E8C9;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;letter-spacing:.04em;cursor:pointer;min-width:215px;justify-content:center;}
.sel-btn .cv{color:var(--gold-soft);display:flex;}
.sel-menu{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);min-width:235px;background:#2A2049;
  border:1px solid var(--aubergine-line);border-radius:18px;padding:6px;z-index:40;box-shadow:0 24px 50px -16px rgba(0,0,0,.7);}
.sel-item{display:block;width:100%;text-align:center;border:none;background:transparent;color:#E9DCBC;font-family:'Cormorant Garamond',serif;
  font-weight:600;font-size:18px;padding:11px;border-radius:12px;cursor:pointer;letter-spacing:.03em;}
.sel-item:active,.sel-item.on{background:rgba(216,185,104,.13);color:var(--gold-soft);}

.c-info{text-align:center;position:relative;z-index:5;margin-top:14px;padding:0 20px;}
.c-info .l1{font-family:'EB Garamond',serif;font-size:15px;color:#E7DBBC;letter-spacing:.02em;}
.c-info .l2{font-family:'EB Garamond',serif;font-size:13px;color:#B6A9CB;margin-top:6px;letter-spacing:.02em;}
.c-info .l1 b,.c-info .l2 b{color:var(--gold-soft);font-weight:400;margin:0 7px;font-size:.9em;}
.c-info .zhh{font-family:'Noto Serif TC',serif;}

/* the chart grid */
.c-board{position:relative;z-index:5;margin:18px 12px 0;border:1px solid rgba(216,185,104,.28);border-radius:3px;background:var(--ivory-cell);
  box-shadow:0 20px 50px -22px rgba(0,0,0,.7);overflow:hidden;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);}
.cell{position:relative;border-right:1px solid rgba(169,136,63,.26);border-bottom:1px solid rgba(169,136,63,.26);
  min-height:118px;padding:9px 9px 7px;cursor:pointer;background:var(--ivory-cell);transition:background .2s;display:flex;flex-direction:column;}
.cell:nth-child(4n){border-right:none;}
.grid4 .cell.r4{border-bottom:none;}
.cell:active{background:var(--ivory-cell-2);}
.cell.active{background:#F6EFDC;box-shadow:inset 0 0 0 2px var(--gold-2);}
.cell.active::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 70% at 50% 30%,rgba(201,162,76,.12),transparent);pointer-events:none;}
.cell .majors{display:flex;gap:9px;flex-wrap:wrap;}
.cell .maj{font-family:'Noto Serif TC',serif;font-weight:600;font-size:21px;line-height:1.15;writing-mode:vertical-rl;text-orientation:upright;letter-spacing:.04em;}
.maj.maroon{color:var(--st-maroon);}.maj.purple{color:var(--st-purple);}.maj.blue{color:var(--st-blue);}
.maj.green{color:var(--st-green);}.maj.ink{color:var(--st-ink);}
.cell .minors{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;flex:1;align-content:flex-start;}
.cell .min{font-family:'Noto Serif TC',serif;font-weight:500;font-size:13px;color:var(--st-minor);writing-mode:vertical-rl;line-height:1.1;letter-spacing:.02em;}
.cell .min.hua{color:var(--st-hua);}
.cell .foot{display:flex;align-items:baseline;justify-content:space-between;margin-top:auto;padding-top:5px;}
.cell .branch{font-family:'Noto Serif TC',serif;font-weight:600;font-size:16px;color:var(--st-ink);}
.cell .pal-nm{font-family:'Noto Serif TC',serif;font-size:11px;color:var(--st-minor);opacity:.85;}
.cell .ages{font-family:'EB Garamond',serif;font-size:12px;color:#8A7E64;font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.cell .hua-badge{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:3px;}
.cell .hb{width:17px;height:17px;border-radius:3px;font-family:'Noto Serif TC',serif;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;color:#fff;}

/* center panel */
.center-cell{grid-column:2/4;grid-row:2/4;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--ivory-cell);overflow:hidden;}
.center-mist{position:absolute;left:0;right:0;bottom:0;height:62%;z-index:1;opacity:.85;pointer-events:none;}
.center-cell .cc-in{position:relative;z-index:2;text-align:center;}
.cc-pal{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--st-minor);letter-spacing:.16em;padding-left:.16em;}
.cc-big{font-family:'Noto Serif TC',serif;font-weight:600;font-size:46px;color:var(--st-ink);line-height:1.05;margin:6px 0 12px;}
.cc-br{font-family:'Noto Serif TC',serif;font-size:18px;color:#6F6552;margin-top:2px;}
.cc-body{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--st-minor);margin-top:9px;}

/* tab bar (overview etc) */
.c-tabs{position:relative;z-index:5;display:flex;justify-content:space-between;padding:18px 22px 14px;margin:0 4px;}
.tab{display:flex;flex-direction:column;align-items:center;gap:7px;border:none;background:transparent;cursor:pointer;flex:1;color:rgba(214,196,150,.5);}
.tab .tic{width:46px;height:46px;border-radius:50%;border:1px solid rgba(216,185,104,.25);display:flex;align-items:center;justify-content:center;}
.tab .tlbl{font-family:'EB Garamond',serif;font-size:11px;letter-spacing:.13em;text-transform:uppercase;}
.tab.on{color:var(--gold-soft);}
.tab.on .tic{border-color:var(--gold-soft);background:radial-gradient(circle,rgba(216,185,104,.16),transparent 70%);box-shadow:0 0 22px -4px rgba(216,185,104,.4);}
.tab.dis{opacity:.5;}

/* overview panel */
.c-panel{position:relative;z-index:5;background:var(--ivory-3);border-radius:26px 26px 0 0;margin-top:4px;padding:24px 26px 14px;
  box-shadow:0 -14px 36px -18px rgba(0,0,0,.5);min-height:150px;}
.pan-head{display:flex;align-items:center;gap:13px;color:var(--gold);}
.pan-head .ph-lbl{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.28em;font-size:16px;text-transform:uppercase;padding-left:.28em;color:var(--ink);}
.pan-head .ph-dia{font-size:8px;}
.pan-head .ph-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
.c-panel .watermark{position:absolute;right:22px;bottom:14px;font-family:'Noto Serif TC',serif;font-weight:600;font-size:54px;line-height:.9;
  color:rgba(169,136,63,.13);writing-mode:vertical-rl;text-orientation:upright;}
.pan-body{font-family:'EB Garamond',serif;font-size:15.5px;line-height:1.62;color:var(--ink-2);margin-top:15px;max-width:88%;}
.pan-detail{margin-top:16px;}
.pd-row{display:flex;gap:10px;margin-top:11px;}
.pd-star{display:flex;align-items:center;gap:9px;}
.pd-zh{font-family:'Noto Serif TC',serif;font-weight:600;font-size:19px;}
.pd-en{font-family:'EB Garamond',serif;font-size:14px;color:var(--ink-soft);}
.pd-tag{font-family:'EB Garamond',serif;font-size:12px;color:var(--gold);border:1px solid var(--gold-soft);border-radius:20px;padding:3px 11px;letter-spacing:.04em;}
.pd-stars{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;}

/* ---- tab panels: lists, elements, analysis ---- */
.pan-list{margin-top:6px;}
.pl-row{display:flex;align-items:center;gap:13px;width:100%;text-align:left;border:none;background:transparent;cursor:pointer;
  padding:13px 8px;border-top:1px solid var(--ivory-line);border-radius:11px;transition:background .15s;}
.pan-list .pl-row:first-child{border-top:none;}
.pl-row:active{background:rgba(169,136,63,.06);}
.pl-row.on{background:rgba(201,162,76,.13);box-shadow:inset 0 0 0 1px var(--gold-soft);}
.pl-zh{font-family:'Noto Serif TC',serif;font-weight:600;font-size:22px;line-height:1;flex:0 0 auto;}
.pl-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.pl-en{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;color:var(--ink);line-height:1;}
.pl-meta{font-family:'EB Garamond',serif;font-size:12.5px;color:var(--ink-soft);}
.el-chip{font-family:'EB Garamond',serif;font-size:11.5px;border:1px solid;border-radius:20px;padding:3px 9px;white-space:nowrap;opacity:.9;letter-spacing:.02em;flex:0 0 auto;}
.bright-badge{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold);width:24px;text-align:center;flex:0 0 auto;}
.pl-pal{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.pl-stars{display:flex;gap:7px;font-family:'Noto Serif TC',serif;font-weight:600;font-size:18px;flex:0 0 auto;}
.pl-br{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--st-ink);display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex:0 0 auto;}
.pl-br small{font-family:'EB Garamond',serif;font-size:11.5px;color:#8A7E64;font-variant-numeric:tabular-nums;}

.bureau-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:14px 16px;
  background:var(--ivory-2);border:1px solid var(--ivory-line);border-radius:14px;}
.bureau-label{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
.bureau-val{font-family:'Noto Serif TC',serif;font-weight:600;font-size:19px;white-space:nowrap;text-align:right;}
.el-bars{margin-top:18px;display:flex;flex-direction:column;gap:13px;}
.el-bar{display:flex;align-items:center;gap:13px;}
.el-name{font-family:'Noto Serif TC',serif;font-weight:600;font-size:19px;width:74px;flex:0 0 auto;display:flex;align-items:baseline;gap:7px;}
.el-name small{font-family:'EB Garamond',serif;font-size:12px;color:var(--ink-soft);font-weight:400;}
.el-track{flex:1;height:9px;border-radius:6px;background:rgba(43,42,71,.08);overflow:hidden;}
.el-fill{display:block;height:100%;border-radius:6px;transition:width .5s cubic-bezier(.22,.8,.26,1);min-width:3px;}
.el-num{font-family:'EB Garamond',serif;font-size:14px;color:var(--ink-2);width:16px;text-align:right;font-variant-numeric:tabular-nums;flex:0 0 auto;}

.an-lead{margin-top:16px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
.an-lead-zh{font-family:'Noto Serif TC',serif;font-weight:600;font-size:44px;line-height:1;}
.an-lead-meta{display:flex;align-items:center;}
.an-read{font-family:'EB Garamond',serif;font-size:15.5px;line-height:1.6;color:var(--ink-2);margin:4px 0 0;max-width:90%;}
.pan-sublbl{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:22px;padding-left:.18em;}
.an-domains{margin-top:8px;display:flex;flex-direction:column;}
.an-dom{display:flex;gap:13px;padding:13px 0;border-top:1px solid var(--ivory-line);}
.an-dom:first-child{border-top:none;}
.an-dom-pal{font-family:'Noto Serif TC',serif;font-weight:600;font-size:18px;color:var(--st-ink);width:84px;flex:0 0 auto;display:flex;flex-direction:column;gap:3px;}
.an-dom-pal small{font-family:'EB Garamond',serif;font-size:11.5px;color:var(--ink-soft);font-weight:400;}
.an-dom-read{font-family:'EB Garamond',serif;font-size:14.5px;line-height:1.5;color:var(--ink-2);flex:1;}
.an-dom-read b{font-family:'Noto Serif TC',serif;font-weight:600;font-size:17px;margin-right:4px;}

/* =====================================================
   AUTH / SIGN-IN SCREEN (dark celestial)
===================================================== */
.auth-screen{background:var(--aubergine);}
.auth-lang{position:absolute;top:14px;right:20px;z-index:8;border:1px solid var(--aubergine-line);background:rgba(11,8,24,.3);
  color:var(--gold-soft);border-radius:18px;padding:7px 14px;font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:13px;letter-spacing:.12em;cursor:pointer;}
.auth-lang:active{background:rgba(216,185,104,.14);}
.auth-scroll{display:flex;flex-direction:column;}
.auth-top{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding:14px 0 6px;}
.auth-top .c-emblem{padding:6px 0 0;}
.auth-wordmark{font-family:'Cormorant Garamond',serif;font-weight:600;color:#F3E8C9;font-size:39px;letter-spacing:.06em;margin:16px 0 0;line-height:1;white-space:nowrap;}
.auth-wordmark span{font-size:.64em;}
.auth-subw{font-family:'EB Garamond',serif;color:var(--gold-soft);letter-spacing:.42em;font-size:11.5px;font-weight:500;margin-top:9px;text-transform:uppercase;padding-left:.42em;}
.auth-tag{font-family:'EB Garamond',serif;font-style:italic;color:#C3B7DA;font-size:15px;line-height:1.5;text-align:center;max-width:300px;margin:16px auto 0;}

.auth-card{position:relative;z-index:5;margin:22px 22px 0;background:rgba(20,15,38,.55);border:1px solid rgba(216,185,104,.22);
  border-radius:26px;padding:20px 22px 22px;backdrop-filter:blur(8px);box-shadow:0 24px 60px -28px rgba(0,0,0,.7);}
.auth-seg{display:flex;background:rgba(11,8,24,.4);border:1px solid var(--aubergine-line);border-radius:14px;padding:4px;gap:4px;margin-bottom:20px;}
.auth-seg button{flex:1;border:none;background:transparent;border-radius:10px;padding:11px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;letter-spacing:.06em;color:#B6A9CB;}
.auth-seg button.on{background:var(--gold-soft);color:#241B3D;box-shadow:0 6px 16px -8px rgba(216,185,104,.6);}

.social{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;margin-top:11px;
  background:rgba(247,241,230,.95);border:1px solid rgba(247,241,230,.4);border-radius:30px;padding:14px;cursor:pointer;
  font-family:'EB Garamond',serif;font-size:15.5px;font-weight:600;color:#241B3D;transition:transform .1s,box-shadow .2s;}
.social span{white-space:nowrap;}
.social svg{flex:0 0 auto;}
.social:active{transform:translateY(1px);}
.social[disabled]{opacity:.85;cursor:default;}
.social .spin-ic path,.social .spin-ic circle{stroke:#241B3D;}
.social:nth-of-type(2){background:rgba(255,255,255,.07);border-color:rgba(216,185,104,.3);color:#F1E7CF;}

.auth-or{display:flex;align-items:center;gap:14px;margin:20px 0 4px;color:#9387B0;}
.auth-or::before,.auth-or::after{content:"";flex:1;height:1px;background:rgba(216,185,104,.22);}
.auth-or span{font-family:'EB Garamond',serif;font-size:12.5px;letter-spacing:.02em;white-space:nowrap;}

.auth-field{margin-top:15px;}
.auth-field label{display:block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:12.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold-soft);margin-bottom:7px;padding-left:.16em;}
.auth-field input{width:100%;font-family:'EB Garamond',serif;font-size:17px;color:#F3ECDD;background:rgba(11,8,24,.4);
  border:1px solid rgba(216,185,104,.25);border-radius:13px;padding:13px 15px;outline:none;transition:border .15s,box-shadow .15s;}
.auth-field input::placeholder{color:#7E739A;}
.auth-field input:focus{border-color:var(--gold-soft);box-shadow:0 0 0 3px rgba(216,185,104,.14);}
.auth-field input.err{border-color:#C25B54;box-shadow:0 0 0 3px rgba(194,91,84,.14);}
.auth-field .hint{font-family:'EB Garamond',serif;font-size:12.5px;color:#E08A82;margin-top:6px;}
.auth-forgot{display:block;margin:11px 0 0 auto;border:none;background:transparent;color:#B6A9CB;cursor:pointer;
  font-family:'EB Garamond',serif;font-size:13.5px;text-align:right;}
.auth-forgot:active{color:var(--gold-soft);}

.auth-primary{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:18px;border:none;border-radius:14px;
  padding:15px;cursor:pointer;background:var(--gold-soft);color:#241B3D;
  font-family:'Cormorant Garamond',serif;font-weight:700;font-size:17px;letter-spacing:.1em;text-transform:uppercase;padding-left:calc(.1em + 8px);
  box-shadow:0 14px 30px -12px rgba(216,185,104,.55);transition:transform .1s;}
.auth-primary:active{transform:translateY(1px);}
.auth-primary[disabled]{opacity:.9;cursor:default;}
.auth-legal{font-family:'EB Garamond',serif;font-size:12px;line-height:1.5;color:#8E82AB;text-align:center;margin:18px auto 2px;max-width:280px;}

.spin-ic{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* account block inside settings */
.acct-box{display:flex;align-items:center;gap:13px;margin-top:8px;padding:14px 16px;background:var(--ivory-3);
  border:1px solid var(--ivory-line);border-radius:14px;}
.acct-av{width:44px;height:44px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  background:var(--aubergine-2);color:var(--gold-soft);font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;}
.acct-info{flex:1;min-width:0;}
.acct-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;color:var(--ink);line-height:1.1;}
.acct-email{font-family:'EB Garamond',serif;font-size:13px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acct-prov{font-family:'EB Garamond',serif;font-size:11px;color:var(--gold);border:1px solid var(--gold-soft);border-radius:16px;padding:2px 9px;flex:0 0 auto;text-transform:capitalize;}
.signout-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:14px;border:1px solid var(--ivory-line);
  background:transparent;border-radius:13px;padding:14px;cursor:pointer;color:var(--st-maroon);
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase;padding-left:calc(.08em + 8px);}
.signout-btn:active{background:rgba(156,58,53,.06);}

/* =====================================================
   BOTTOM SHEET (add/edit profile)
===================================================== */
.scrim{position:absolute;inset:0;z-index:50;background:rgba(28,22,46,.5);backdrop-filter:blur(2px);animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:51;background:var(--ivory-2);border-radius:28px 28px 0 0;
  padding:10px 26px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -20px 50px -10px rgba(0,0,0,.4);
  animation:sheetUp .38s cubic-bezier(.22,.8,.26,1);max-height:92%;overflow-y:auto;scrollbar-width:none;}
.sheet::-webkit-scrollbar{display:none;}
@keyframes sheetUp{from{transform:translateY(102%);}to{transform:translateY(0);}}
.sheet-grip{width:42px;height:5px;border-radius:3px;background:var(--ivory-line);margin:0 auto 14px;}
.sheet-ttl{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:29px;color:var(--ink);text-align:center;letter-spacing:.02em;}
.sheet-sub{font-family:'EB Garamond',serif;text-align:center;color:var(--gold);font-size:12px;letter-spacing:.3em;text-transform:uppercase;margin-top:4px;padding-left:.3em;}
.field{margin-top:18px;}
.field label{display:block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:7px;padding-left:.16em;}
.field .row2{display:flex;gap:13px;}
.field input{width:100%;font-family:'EB Garamond',serif;font-size:18px;color:var(--ink);background:var(--ivory-3);
  border:1px solid var(--ivory-line);border-radius:13px;padding:13px 15px;outline:none;transition:border .15s,box-shadow .15s;}
.field input::placeholder{color:#BCB29D;}
.field input:focus{border-color:var(--gold-2);box-shadow:0 0 0 3px rgba(201,162,76,.14);}
.field input.err{border-color:var(--st-maroon);box-shadow:0 0 0 3px rgba(156,58,53,.12);}
.field .hint{font-family:'EB Garamond',serif;font-size:12px;color:var(--st-maroon);margin-top:5px;}
.sheet-actions{display:flex;gap:13px;margin-top:26px;}
.btn{flex:1;border:none;border-radius:14px;padding:15px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;padding-left:calc(.12em + 8px);}
.btn-primary{background:var(--aubergine-2);color:var(--gold-soft);box-shadow:0 12px 26px -10px rgba(34,26,58,.6);}
.btn-primary:active{background:var(--aubergine-3);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--ivory-line);}
.btn-ghost:active{background:rgba(43,42,71,.04);}
.btn-danger{color:var(--st-maroon);}
.sheet-delete{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:transparent;border:none;
  margin-top:14px;padding:12px;cursor:pointer;color:var(--st-maroon);font-family:'EB Garamond',serif;font-size:15px;letter-spacing:.04em;}
.sheet-delete:active{opacity:.6;}

/* action menu (row dots / settings) */
.menu-sheet{position:absolute;left:14px;right:14px;bottom:14px;z-index:51;background:var(--ivory-2);border-radius:22px;overflow:hidden;
  box-shadow:0 -16px 44px -12px rgba(0,0,0,.4);animation:sheetUp .32s cubic-bezier(.22,.8,.26,1);}
.menu-name{padding:18px 22px 14px;text-align:center;border-bottom:1px solid var(--ivory-line);}
.menu-name .mn-n{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--ink);}
.menu-name .mn-m{font-family:'EB Garamond',serif;font-size:13px;color:var(--ink-soft);margin-top:3px;}
.menu-item{display:flex;align-items:center;gap:14px;width:100%;border:none;background:transparent;padding:17px 24px;cursor:pointer;
  font-family:'EB Garamond',serif;font-size:17px;color:var(--ink);border-top:1px solid var(--ivory-line);text-align:left;}
.menu-item:first-of-type{border-top:none;}
.menu-item:active{background:rgba(169,136,63,.07);}
.menu-item.danger{color:var(--st-maroon);}
.menu-item .mi-ic{color:var(--gold);display:flex;width:22px;}
.menu-item.danger .mi-ic{color:var(--st-maroon);}
.menu-cancel{width:100%;border:none;background:var(--ivory-3);padding:17px;cursor:pointer;font-family:'Cormorant Garamond',serif;
  font-weight:600;font-size:16px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);border-top:6px solid var(--ivory);}

/* settings popover */
.lang-toggle{display:flex;background:var(--ivory-3);border:1px solid var(--ivory-line);border-radius:12px;padding:4px;gap:4px;}
.lang-toggle button{flex:1;border:none;background:transparent;border-radius:9px;padding:11px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px;letter-spacing:.08em;color:var(--ink-soft);}
.lang-toggle button.on{background:var(--aubergine-2);color:var(--gold-soft);}

.empty{text-align:center;padding:40px 30px;color:var(--ink-soft);font-family:'EB Garamond',serif;font-size:16px;font-style:italic;}

.fade{animation:panelRise .34s cubic-bezier(.22,.7,.25,1);}
/* transform-only: if the iframe pauses animations at frame 0, content stays visible */
@keyframes panelRise{from{transform:translateY(8px);}to{transform:translateY(0);}}
</style>

function brightnessOf(key, branch){

  for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return BRIGHT[h%BRIGHT.length];
}

/* ---------- helpers ---------- */
const mod12 = n => ((n % 12) + 12) % 12;

function seedFrom(p){
  const d = (p.date || '1990-01-01').replace(/-/g,'');   // YYYYMMDD
  const t = (p.time || '12:00').replace(':','');          // HHMM
  let s = 0, str = d.slice(4) + t + d.slice(2,4);
  for (let i=0;i<str.length;i++) s = (s*31 + str.charCodeAt(i)) >>> 0;
  return s;
}

/* hour branch (時辰) — this part is real */
function hourBranchIndex(time){
  if(!time) return 6;
  const h = parseInt(time.split(':')[0],10) || 0;
  return Math.floor(((h+1)%24)/2);
}

/* year sexagenary stem+branch — real for solar year */
function yearGanzhi(date){
  const y = parseInt((date||'1990').slice(0,4),10) || 1990;
  return STEMS[mod12((y-4))%10] + BRANCHES[mod12(y-4)];
}

/* place the 14 majors given ziwei branch Z */
function placeMajors(Z){
  const byBranch = Array.from({length:12},()=>[]);
  const put=(b,k)=>byBranch[mod12(b)].push(k);
  put(Z,'ziwei'); put(Z-1,'tianji'); put(Z-3,'taiyang');
  put(Z-4,'wuqu'); put(Z-5,'tiantong'); put(Z-8,'lianzhen');
  const F = mod12(4 - Z);
  put(F,'tianfu'); put(F+1,'taiyin'); put(F+2,'tanlang');
  put(F+3,'jumen'); put(F+4,'tianxiang'); put(F+5,'tianliang');
  put(F+6,'qisha'); put(F+10,'pojun');
  return byBranch;
}

/* main: build a full representative chart object from a profile */
function buildChart(p){
  const seed = seedFrom(p);
  const Z = seed % 12;
  const lifeBranch = mod12(Math.floor(seed/7));
  const bodyBranch = mod12(lifeBranch + 6 + (seed%3));
  const majors = placeMajors(Z);
  const startAge = [2,3,4,5,6][seed%5];
  const forward = (seed & 1) === 0;

  const cells = [];
  for(let b=0;b<12;b++){
    // palace name: 命宮 at lifeBranch, going counter-clockwise
    const palIdx = mod12(lifeBranch - b);
    // decade ages, stepping from 命宮
    const steps = forward ? mod12(b - lifeBranch) : mod12(lifeBranch - b);
    const lo = startAge + steps*10;
    // minors: 1-2 deterministic
    const mi = [];
    const n = 1 + ((seed >> b) & 1);
    for(let k=0;k<n;k++){
      mi.push(MINORS[(seed*7 + b*5 + k*13) % MINORS.length]);
    }
    // occasional hua transformation on a star
    let hua = null;
    if(majors[b].length && ((seed>>b) & 3) === 0){
      hua = HUA[(seed + b) % HUA.length];
    }
    cells.push({
      branch: b,
      branchZh: BRANCHES[b],
      stem: STEMS[(seed + b) % 10],
      grid: GRID[b],
      majors: majors[b],
      minors: mi,
      hua,
      palace: PALACES[palIdx],
      isLife: b === lifeBranch,
      isBody: b === bodyBranch,
      ages: [lo, lo+9],
    });
  }

  const lifeCell = cells[lifeBranch];
  const lifeMajor = lifeCell.majors[0] ? MAJORS[lifeCell.majors[0]] : null;

  // element tally + flat list of the 14 majors with their location
  const elementCounts = {wood:0,fire:0,earth:0,metal:0,water:0};
  const starList = [];
  cells.forEach(c=>{
    c.majors.forEach(k=>{
      elementCounts[STAR_EL[k]]++;
      starList.push({key:k, branch:c.branch, branchZh:c.branchZh, palace:c.palace, bright:brightnessOf(k,c.branch)});
    });
  });

  return {
    cells,
    lifeBranch, bodyBranch,
    lifeMajorZh: lifeMajor ? lifeMajor.zh : '空宮',
    lifeBranchZh: BRANCHES[lifeBranch],
    bodyBranchZh: BRANCHES[bodyBranch],
    ganzhi: yearGanzhi(p.date),
    hourBranch: BRANCHES[hourBranchIndex(p.time)],
    hourPinyin: BRANCH_PINYIN[BRANCHES[hourBranchIndex(p.time)]],
    elementCounts, starList, startAge, bureau: BUREAU[startAge],
  };
}

/* date formatting: "14 May 1990" / "14 mai 1990" */
function fmtDate(iso, lang){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-').map(Number);
  const months = I18N[lang].months;
  return `${d} ${months[(m||1)-1]} ${y}`;
}
/* time: "10:30 AM" (en) / "10:30" (fr 24h) */
function fmtTime(t, lang){
  if(!t) return '—';
  if(lang==='fr') return t;
  let [h,mn] = t.split(':').map(Number);
  const ap = h>=12 ? 'PM':'AM';
  h = h%12; if(h===0) h=12;
  return `${h}:${String(mn).padStart(2,'0')} ${ap}`;
}

/* Starfield for the dark chart screen */
/* Animated celestial backdrop for the dark chart screen:
   parallax twinkling stars, drifting nebula glows, occasional shooting stars.
   Base (paused) state keeps stars visible; motion gated via CSS media query. */
function StarField({seed=7}){
  const data = React.useMemo(()=>{
    let s = (seed*9301+49297) >>> 0;
    const rnd=()=>{ s=(s*9301+49297)%233280; return s/233280; };
    const mk = (n, big) => Array.from({length:n},()=>({
      x: rnd()*100, y: rnd()*100,
      size: (big ? rnd()*1.6+1.3 : rnd()*1.1+0.7),
      o0: rnd()*0.25+0.12, o1: rnd()*0.4+0.55,
      dur: rnd()*4+3.2, delay: -rnd()*6,
      gold: rnd()>0.45,
    }));
    return {
      far: mk(30,false),
      near: mk(20,true),
      nebulas: [
        {x:14, y:10, s:200, c:'rgba(150,110,200,0.34)', dur:34, delay:0},
        {x:82, y:8,  s:170, c:'rgba(201,162,76,0.30)',  dur:42, delay:-8},
        {x:60, y:30, s:150, c:'rgba(110,90,170,0.26)',  dur:38, delay:-16},
      ],
      shooting: [
        {x:8,  y:14, dur:11, delay:3},
        {x:55, y:6,  dur:15, delay:9},
      ],
    };
  },[seed]);

  const Star = (st,i,layer)=>(
    <span key={layer+i} className="star" style={{
      left:st.x+'%', top:st.y+'%', width:st.size+'px', height:st.size+'px',
      background: st.gold ? '#F0E2B8' : '#CFC6F2',
      boxShadow: `0 0 ${st.size*2.2}px ${st.size*0.6}px ${st.gold?'rgba(240,226,184,0.5)':'rgba(190,180,235,0.45)'}`,
      '--o0':st.o0, '--o1':st.o1, '--dur':st.dur+'s', '--delay':st.delay+'s',
    }}/>
  );

  return (
    <div className="c-stars">
      {data.nebulas.map((n,i)=>(
        <span key={'n'+i} className="nebula" style={{
          left:n.x+'%', top:n.y+'%', width:n.s+'px', height:n.s+'px',
          background:`radial-gradient(circle, ${n.c}, transparent 68%)`,
          '--ndur':n.dur+'s', '--ndelay':n.delay+'s',
        }}/>
      ))}
      <div className="star-layer l1">{data.far.map((st,i)=>Star(st,i,'f'))}</div>
      <div className="star-layer l2">{data.near.map((st,i)=>Star(st,i,'n'))}</div>
      {data.shooting.map((sh,i)=>(
        <span key={'s'+i} className="shooting" style={{
          left:sh.x+'%', top:sh.y+'%', '--sdur':sh.dur+'s', '--sdelay':sh.delay+'s',
        }}/>
      ))}
    </div>
  );
}

/* the 4x4 board */
function Board({chart, t, lang, activeBranch, onTapBranch}){
  // build a 4x4 matrix of branch indices (perimeter) + center marker
  const slots = {};
  chart.cells.forEach(c=>{ slots[`${c.grid[0]}-${c.grid[1]}`] = c; });
  const rendered = [];
  for(let r=0;r<4;r++){
    for(let col=0;col<4;col++){
      if(r===1 && col===1){
        // place the center cell once
        rendered.push(
          <div key="center" className="center-cell">
            <CenterMist/>
            <div className="cc-in">
              <div className="cc-pal">{PALACES[0].zh}</div>
              <div className="cc-big">{chart.lifeMajorZh}</div>
              <div className="cc-br">{chart.lifeBranchZh}宮</div>
              <div className="cc-body">身宮：{chart.bodyBranchZh}</div>
            </div>
          </div>
        );
        continue;
      }
      if((r===1&&col===2)||(r===2&&col===1)||(r===2&&col===2)) continue; // covered by center
      const c = slots[`${r}-${col}`];
      if(!c) continue;
      rendered.push(
        <PalaceCell key={c.branch} cell={c} t={t} lang={lang}
          active={activeBranch===c.branch} onTap={()=>onTapBranch(c.branch)}
          rowClass={r===3?'r4':''}/>
      );
    }
  }
  return <div className="grid4">{rendered}</div>;
}

            const v=chart.elementCounts[el]; const E=ELEMENTS[el];
            return (
              <div key={el} className="el-bar">
                <span className="el-name" style={{color:E.color}}>{E.zh}<small>{lang==='en'?E.en:E.fr}</small></span>
                <span className="el-track"><span className="el-fill" style={{width:`${(v/max)*100}%`,background:E.color}}/></span>
                <span className="el-num">{v}</span>
              </div>
            );
          })}
        </div>
        <div className="pan-body" style={{maxWidth:'92%'}}>{t.elementsIntro}</div>
      </div>
    </div>
  );
}

/* ---- Analysis panel: life palace + key domains ---- */
function AnalysisPanel({chart, t, lang}){
  const find = zh => chart.cells.find(c=>c.palace.zh===zh);
  const life = find('命宮');
  const domains = ['財帛','官祿','夫妻'].map(find).filter(Boolean);
  const lead = c => (c && c.majors[0]) ? MAJORS[c.majors[0]] : null;
  const lifeStar = lead(life);
  return (
    <div className="c-panel">
      <div className="watermark">析</div>
      <PanHead label={t.analysis}/>
      <div className="fade">
        <div className="an-lead">
          <span className="an-lead-zh" style={{color:lifeStar?`var(--st-${lifeStar.color})`:'var(--st-ink)'}}>{lifeStar?lifeStar.zh:'空宮'}</span>
          <span className="an-lead-meta">
            <span className="pd-tag">{lang==='en'?life.palace.en:life.palace.fr}</span>
            <span style={{marginLeft:'9px',color:'var(--ink-soft)',fontFamily:"'EB Garamond',serif",fontSize:'14px'}}>{life.branchZh} · {life.ages[0]}–{life.ages[1]}</span>
          </span>
          <p className="an-read">
            {lifeStar
              ? `${t.lifeCarries} ${lang==='en'?lifeStar.en:lifeStar.fr} — ${lang==='en'?READINGS[life.majors[0]].en:READINGS[life.majors[0]].fr}`
              : t.empty}
          </p>
        </div>
        <div className="pan-sublbl">{t.keyDomains}</div>
        <div className="an-domains">
          {domains.map(c=>{
            const M=lead(c);
            return (
              <div key={c.branch} className="an-dom">
                <span className="an-dom-pal">{c.palace.zh}<small>{lang==='en'?c.palace.en:c.palace.fr}</small></span>
                <span className="an-dom-read">
                  {M
                    ? <React.Fragment><b style={{color:`var(--st-${M.color})`}}>{M.zh}</b>{lang==='en'?READINGS[c.majors[0]].en:READINGS[c.majors[0]].fr}</React.Fragment>
                    : t.noMajor}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---- panel switcher ---- */
function ChartPanel({tab, chart, t, lang, activeBranch, onPick}){
  if(tab==='stars')    return <StarsPanel chart={chart} t={t} lang={lang} activeBranch={activeBranch} onPick={onPick}/>;
  if(tab==='palaces')  return <PalacesPanel chart={chart} t={t} lang={lang} activeBranch={activeBranch} onPick={onPick}/>;
  if(tab==='elements') return <ElementsPanel chart={chart} t={t} lang={lang}/>;
  if(tab==='analysis') return <AnalysisPanel chart={chart} t={t} lang={lang}/>;
  return <OverviewPanel chart={chart} t={t} lang={lang} activeBranch={activeBranch}/>;
}

/* ---- the chart screen ---- */
function ChartScreen({profile, profiles, t, lang, onBack, onSwitch, onMenu}){
  const [activeBranch,setActiveBranch] = React.useState(null);
  const [activeTab,setActiveTab] = React.useState('overview');
  const [selOpen,setSelOpen] = React.useState(false);
  const chart = React.useMemo(()=>buildChart(profile),[profile.id, profile.date, profile.time]);

  React.useEffect(()=>{ setActiveBranch(null); setSelOpen(false); setActiveTab('overview'); },[profile.id]);

  // tapping a palace on the board highlights it and shows its reading in Overview
  function tapBranch(b){ setActiveBranch(prev=> prev===b ? null : b); setActiveTab('overview'); }

  return (
    <div className="screen screen-slide c-screen">
      <StatusBar theme="light"/>
      <StarField seed={chart.lifeBranch+3}/>
      <div className="c-head">
        <button className="ic-light" onClick={onBack} aria-label="back"><Back/></button>
        <span className="ttl">M<span style={{fontSize:'.8em'}}>ING</span> P<span style={{fontSize:'.8em'}}>AN</span></span>
        <button className="ic-light" onClick={onMenu} aria-label="menu"><DotsH/></button>
      </div>

      <div className="scroll">
        <div className="c-emblem">
          <Seal/>
        </div>

        <div className="c-selector">
          <button className="sel-btn" onClick={()=>setSelOpen(o=>!o)}>
            {profile.name}<span className="cv"><ChevronDown/></span>
          </button>
          {selOpen && (
            <div className="sel-menu">
              {profiles.map(p=>(
                <button key={p.id} className={`sel-item ${p.id===profile.id?'on':''}`}
                  onClick={()=>{onSwitch(p.id);setSelOpen(false);}}>{p.name}</button>
              ))}
            </div>
          )}
        </div>

        <div className="c-info">
          <div className="l1">{fmtDate(profile.date,lang)}<b>·</b>{fmtTime(profile.time,lang)}<b>·</b>{profile.place||'—'}</div>
          <div className="l2">
            {t.sexagenary}: <span className="zhh" style={{color:'var(--gold-soft)'}}>{chart.ganzhi}</span><b>·</b>
            {t.hour}: <span className="zhh" style={{color:'var(--gold-soft)'}}>{chart.hourBranch}</span> ({chart.hourPinyin})
          </div>
        </div>

        <div className="c-board">
          <Board chart={chart} t={t} lang={lang} activeBranch={activeBranch} onTapBranch={tapBranch}/>
        </div>

        <ChartTabs t={t} active={activeTab} onSelect={setActiveTab}/>
        <ChartPanel tab={activeTab} chart={chart} t={t} lang={lang} activeBranch={activeBranch} onPick={setActiveBranch}/>
        <div className="home-ind dark"><i/></div>
      </div>
    </div>
  );
}

/* ---- Auth / sign-in screen ---- */
function AuthScreen({t, lang, onAuth, onLang}){
  const [mode,setMode]   = React.useState('signin');   // 'signin' | 'signup'
  const [email,setEmail] = React.useState('');
  const [pw,setPw]       = React.useState('');
  const [name,setName]   = React.useState('');
  const [err,setErr]     = React.useState({});
  const [busy,setBusy]   = React.useState(null);        // 'google' | 'apple' | 'email' | null

  const isSignup = mode==='signup';

  function social(provider){
    if(busy) return;
    setBusy(provider);
    // mock OAuth round-trip
    setTimeout(()=>{
      onAuth({
        provider,
        name: provider==='google' ? 'Google User' : 'Apple User',
        email: provider==='google' ? 'you@gmail.com' : 'you@icloud.com',
      });
    }, 950);
  }
  function submitEmail(){
    if(busy) return;
    const e={};
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) e.email=t.invalidEmail;
    if(pw.length<6) e.pw=t.shortPw;
    setErr(e);
    if(Object.keys(e).length) return;
    setBusy('email');
    setTimeout(()=>{
      onAuth({provider:'email', name: (isSignup && name.trim()) ? name.trim() : email.split('@')[0], email});
    }, 700);
  }

  return (
    <div className="screen auth-screen c-screen">
      <StatusBar theme="light"/>
      <StarField seed={11}/>
      <button className="auth-lang" onClick={()=>onLang(lang==='en'?'fr':'en')}>{lang==='en'?'FR':'EN'}</button>
      <div className="scroll auth-scroll">
        <div className="auth-top">
          <div className="c-emblem"><Seal/></div>
          <h1 className="auth-wordmark">M<span>ING</span> P<span>AN</span></h1>
          <div className="auth-subw">{t.subtitle}</div>
          <p className="auth-tag">{t.authTag}</p>
        </div>

        <div className="auth-card">
          <div className="auth-seg">
            <button className={!isSignup?'on':''} onClick={()=>{setMode('signin');setErr({});}}>{t.modeSignIn}</button>
            <button className={isSignup?'on':''} onClick={()=>{setMode('signup');setErr({});}}>{t.modeSignUp}</button>
          </div>

          <button className="social" onClick={()=>social('google')} disabled={!!busy}>
            {busy==='google' ? <Spinner color="#F1E7CF"/> : <GoogleG/>}
            <span>{busy==='google' ? t.connecting : t.continueGoogle}</span>
          </button>
          <button className="social" onClick={()=>social('apple')} disabled={!!busy}>
            {busy==='apple' ? <Spinner color="#F1E7CF"/> : <AppleLogo/>}
            <span>{busy==='apple' ? t.connecting : t.continueApple}</span>
          </button>

          <div className="auth-or"><span>{t.orEmail}</span></div>

          {isSignup && (
            <div className="auth-field">
              <label>{t.fullName}</label>
              <input value={name} placeholder={t.namePh2} onChange={e=>setName(e.target.value)}/>
            </div>
          )}
          <div className="auth-field">
            <label>{t.emailLabel}</label>
            <input type="email" inputMode="email" autoCapitalize="none" className={err.email?'err':''}
              value={email} placeholder={t.emailPh} onChange={e=>setEmail(e.target.value)}/>
            {err.email && <div className="hint">{err.email}</div>}
          </div>
          <div className="auth-field">
            <label>{t.passwordLabel}</label>
            <input type="password" className={err.pw?'err':''} value={pw} placeholder={t.passwordPh}
              onChange={e=>setPw(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submitEmail();}}/>
            {err.pw && <div className="hint">{err.pw}</div>}
          </div>
          {!isSignup && <button className="auth-forgot" type="button">{t.forgot}</button>}

          <button className="auth-primary" onClick={submitEmail} disabled={busy==='email'}>
            {busy==='email' ? <Spinner color="#241B3D"/> : (isSignup ? t.doSignUp : t.doSignIn)}
          </button>

          <p className="auth-legal">{t.legal}</p>
        </div>
        <div className="home-ind dark"><i/></div>
      </div>
    </div>
  );
}

/* =====================================================
   app.jsx — root state, routing, localStorage persistence
===================================================== */
const { useState, useEffect } = React;
const LS_PROFILES = 'mingpan.profiles.v1';
const LS_LANG     = 'mingpan.lang.v1';
const LS_SELECTED = 'mingpan.selected.v1';
const LS_AUTH     = 'mingpan.auth.v1';

function loadAuth(){
  try{ const raw=localStorage.getItem(LS_AUTH); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}

function loadProfiles(){
  try{
    const raw = localStorage.getItem(LS_PROFILES);
    if(raw){ const arr=JSON.parse(raw); if(Array.isArray(arr)) return arr; }
  }catch(e){}
  return SAMPLE_PROFILES.slice();
}
const uid = () => 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function App(){
  const [profiles,setProfiles] = useState(loadProfiles);
  const [lang,setLang] = useState(()=> localStorage.getItem(LS_LANG) || 'en');
  const [auth,setAuth] = useState(loadAuth);
  const [screen,setScreen] = useState('profiles');          // 'profiles' | 'chart'
  const [selectedId,setSelectedId] = useState(()=> localStorage.getItem(LS_SELECTED) || null);
  const [overlay,setOverlay] = useState(null);  // {type:'sheet',edit?} | {type:'rowmenu',id} | {type:'settings'}

  const t = I18N[lang];

  /* persistence */
  useEffect(()=>{ try{localStorage.setItem(LS_PROFILES, JSON.stringify(profiles));}catch(e){} },[profiles]);
  useEffect(()=>{ localStorage.setItem(LS_LANG, lang); document.documentElement.lang=lang; },[lang]);
  useEffect(()=>{ if(selectedId) localStorage.setItem(LS_SELECTED, selectedId); },[selectedId]);
  useEffect(()=>{ try{ auth ? localStorage.setItem(LS_AUTH, JSON.stringify(auth)) : localStorage.removeItem(LS_AUTH); }catch(e){} },[auth]);

  function signIn(user){ setAuth(user); setScreen('profiles'); }
  function signOut(){ setAuth(null); setOverlay(null); setScreen('profiles'); }

  const selected = profiles.find(p=>p.id===selectedId) || null;

  /* navigation */
  function openChart(id){
    setSelectedId(id);
    setOverlay(null);
    setScreen('chart');
  }
  function goProfiles(){ setScreen('profiles'); }
  function goChartTab(){
    if(selected) setScreen('chart');
    else if(profiles[0]){ setSelectedId(profiles[0].id); setScreen('chart'); }
  }

  /* CRUD */
  function saveProfile(data){
    if(data.id){
      setProfiles(ps=>ps.map(p=>p.id===data.id?{...p,...data}:p));
    }else{
      const np={...data, id:uid()};
      setProfiles(ps=>[...ps,np]);
      setSelectedId(np.id);
    }
    setOverlay(null);
  }
  function deleteProfile(id){
    setProfiles(ps=>ps.filter(p=>p.id!==id));
    if(selectedId===id){
      const rest = profiles.filter(p=>p.id!==id);
      setSelectedId(rest[0]?.id || null);
      if(rest.length===0) setScreen('profiles');
    }
    setOverlay(null);
  }

  const menuProfile = overlay?.type==='rowmenu' ? profiles.find(p=>p.id===overlay.id) : null;

  /* not signed in — show the auth portal */
  if(!auth){
    return (
      <div className="phone">
        <AuthScreen t={t} lang={lang} onAuth={signIn} onLang={setLang}/>
      </div>
    );
  }

  return (
    <div className="phone">
      {screen==='profiles' && (
        <ProfilesScreen
          profiles={profiles} t={t} lang={lang}
          onOpenChart={openChart}
          onAdd={()=>setOverlay({type:'sheet'})}
          onRowMenu={(id)=>setOverlay({type:'rowmenu',id})}
          onSettings={()=>setOverlay({type:'settings'})}
        />
      )}
      {screen==='chart' && selected && (
        <ChartScreen
          key={selected.id}
          profile={selected} profiles={profiles} t={t} lang={lang}
          onBack={goProfiles}
          onSwitch={(id)=>setSelectedId(id)}
          onMenu={()=>setOverlay({type:'rowmenu',id:selected.id})}
        />
      )}

      {screen==='profiles' && (
        <BottomNav active="profiles" t={t}
          onProfiles={goProfiles} onChart={goChartTab}
          canChart={profiles.length>0}/>
      )}

      {/* overlays */}
      {overlay?.type==='sheet' && (
        <ProfileSheet init={overlay.edit||null} t={t}
          onClose={()=>setOverlay(null)} onSave={saveProfile} onDelete={deleteProfile}/>
      )}
      {overlay?.type==='settings' && (
        <SettingsSheet t={t} lang={lang} onLang={setLang} auth={auth} onSignOut={signOut} onClose={()=>setOverlay(null)}/>
      )}
      {overlay?.type==='rowmenu' && menuProfile && (
        <RowMenu p={menuProfile} t={t} lang={lang}
          onClose={()=>setOverlay(null)}
          onOpen={()=>openChart(menuProfile.id)}
          onEdit={()=>setOverlay({type:'sheet', edit:menuProfile})}
          onDelete={()=>deleteProfile(menuProfile.id)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
